# Listen only on the host-only interface
interface=enp0s8
bind-interfaces

# DHCP range for nodes
dhcp-range=192.168.56.11,192.168.56.13,255.255.255.0,12h

# Assign fixed IPs to nodes by MAC address (fill these in later)
#dhcp-host=AA:BB:CC:DD:EE:01,node1,192.168.56.11
#dhcp-host=AA:BB:CC:DD:EE:02,node2,192.168.56.12
#dhcp-host=AA:BB:CC:DD:EE:03,node3,192.168.56.13

# PXE boot options
dhcp-boot=pxelinux.0
enable-tftp
tftp-root=/srv/tftp

# DNS
domain=cluster.local
local=/cluster.local/