```
# Locale and keyboard
d-i debian-installer/locale string en_US
d-i keyboard-configuration/xkb-keymap select us

# Network: host-only interface
d-i netcfg/choose_interface select enp0s3
d-i netcfg/dhcp_timeout string 60
d-i netcfg/get_hostname string temphost
d-i netcfg/get_domain string cluster.local

# Mirror - use internet via NAT during install
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC

# Disk
d-i partman-auto/method string regular
d-i partman-auto/disk string /dev/sda
d-i partman-auto/choose_recipe select atomic
d-i partman/confirm_write_new_label boolean true
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-md/device_remove_md boolean true

# Users
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Cluster Admin
d-i passwd/username string debuser
d-i passwd/user-password password changeme
d-i passwd/user-password-again password changeme
d-i passwd/user-default-groups string sudo

# Minimal install
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server sudo

# No popularity contest
popularity-contest popularity-contest/participate boolean false

# GRUB
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# Late command
d-i preseed/late_command string \
    IP=$(ip -4 addr show enp0s3 | grep -oP '(?<=inet\s)\d+\.\d+\.\d+\.\d+'); \
    LAST=$(echo $IP | awk -F. '{print $4}'); \
    echo "source /etc/network/interfaces.d/*" > /target/etc/network/interfaces; \
    echo "auto lo" >> /target/etc/network/interfaces; \
    echo "iface lo inet loopback" >> /target/etc/network/interfaces; \
    echo "auto enp0s3" >> /target/etc/network/interfaces; \
    echo "iface enp0s3 inet dhcp" >> /target/etc/network/interfaces; \
    echo "node${LAST}" > /target/etc/hostname; \
    echo "127.0.0.1 node${LAST}" >> /target/etc/hosts

# Finish
d-i finish-install/reboot_in_progress note
