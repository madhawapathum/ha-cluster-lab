# NOTE: This configuration should be present in every node in the system.
# For backup nodes, the state should be BACKUP and the priority should always be lesser than the master node.
vrrp_instance VI_1 {
    state MASTER
    interface enp0s3
    virtual_router_id 51
    priority 110
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass cluster123
    }
    virtual_ipaddress {
        192.168.56.100
    }
}